<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Encabezado de la página -->
    <header class="main-header">
        <div class="header-left-group">
            <h1 class="logo-title">My Media Journal</h1>
            <!-- Barra de progreso anual automática -->
            <div class="yearly-progress-wrapper">
                <span class="yearly-label">Progreso Anual 2026:</span>
                <div class="yearly-progress-container">
                    <div class="yearly-progress-bar" id="yearly-bar" style="width: 0%;"></div>
                </div>
                <span id="yearly-text" class="yearly-percentage">0%</span>
            </div>
        </div>
        <div class="header-right">
            <!-- Contador de ítems completados al 100% -->
            <div class="completion-counter">🏆 Completados: <span id="completed-count">0</span></div>
            <input type="search" placeholder="🔍 Buscar..." class="search-bar">
            <button class="btn-add">+ Add Item</button>
        </div>
    </header>

    <!-- Contenedor principal de tres columnas -->
    <main class="dashboard-grid">
        
        <!-- COLUMNA 1: CINE Y LITERATURA -->
        <section class="column col-cinema">
            <div class="section-box" id="section-cinema">
                <h2>Cinema & Film 🎬</h2>
                <h3>Watching</h3>
                <!-- Los ítems dinámicos aparecerán aquí -->
            </div>
            
            <div class="section-box" id="section-literature">
                <h2>Literature & Reads 📚</h2>
                <h3>Currently Reading</h3>
                <!-- Los ítems dinámicos aparecerán aquí -->
            </div>
        </section>

        <!-- COLUMNA 2: ENTRADAS Y ARCHIVOS (CENTRO) -->
        <section class="column col-center">
            <!-- Bloque de Nueva Entrada Interactivo con Categorías de Notas -->
            <div class="section-box white-box">
                <h2>📝 New Entry</h2>
                <div class="notes-container">
                    <label for="note-category" style="font-size: 12px; font-weight: 600; color: #5a6e5f; text-transform: uppercase; display: block; margin-bottom: 4px;">Tipo de Nota:</label>
                    <select id="note-category" style="padding: 8px; border-radius: 6px; border: 1px solid #c2c9b1; background-color: #fcfdfa; color: #2b3a2f; font-size: 14px; outline: none; margin-bottom: 10px; width: 100%;">
                        <option value="review">📝 Reseña / Opinión</option>
                        <option value="quote">💬 Cita / Frase Favorita</option>
                        <option value="reminder">⏰ Recordatorio / Pendiente</option>
                    </select>

                    <textarea id="note-text" placeholder="Escribe aquí tu reseña o pensamientos del día..."></textarea>
                    <button id="btn-save-note">Guardar Nota</button>
                </div>
                <!-- Lista de notas guardadas -->
                <div id="saved-notes-list"></div>
            </div>
            
            <!-- Bloque de Galería Visual "Want to View" Dinámico -->
            <div class="section-box white-box">
                <h2>Want to View 🎬</h2>
                <div class="image-gallery" id="want-to-view-gallery">
                    <!-- Portadas en 0% de progreso automáticas -->
                </div>
            </div>

            <!-- Bloque de Libros Pendientes "Want to Read" Dinámico -->
            <div class="section-box white-box bookmark-section">
                <h2>Want to Read 📚</h2>
                <div class="bookshelf">
                    <!-- Lomos de libros en 0% de progreso automáticos -->
                </div>
            </div>
        </section>

        <!-- COLUMNA 3: SERIES -->
        <section class="column col-series">
            <div class="section-box" id="section-series">
                <h2>Serialized Stories 📺</h2>
                <h3>Currently Airing</h3>
                <!-- Los ítems dinámicos aparecerán aquí -->
            </div>
        </section>

    </main>

    <!-- VENTANA FLOTANTE (FORMULARIO CON COPIA DE SEGURIDAD) -->
    <div id="modal-form" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>Agregar Nuevo Ítem</h2>
            <form id="media-form">
                <label for="category">Categoría:</label>
                <select id="category" required>
                    <option value="cinema">🎬 Cinema & Film</option>
                    <option value="literature">📚 Literature & Reads</option>
                    <option value="series">📺 Serialized Stories</option>
                </select>

                <label for="title">Título:</label>
                <input type="text" id="title" placeholder="Ej. Inception" required>

                <label for="progress">Progreso (%):</label>
                <input type="number" id="progress" min="0" max="100" value="0" required>

                <label for="rating">Calificación:</label>
                <select id="rating">
                    <option value="">Sin calificar</option>
                    <option value="⭐">⭐ (1/5)</option>
                    <option value="⭐⭐">⭐⭐ (2/5)</option>
                    <option value="⭐⭐⭐">⭐⭐⭐ (3/5)</option>
                    <option value="⭐⭐⭐⭐">⭐⭐⭐⭐ (4/5)</option>
                    <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐ (5/5)</option>
                </select>

                <label for="image">Enlace de la imagen (URL de internet):</label>
                <input type="url" id="image" placeholder="https://ejemplo.com">

                <button type="submit" class="btn-submit">Guardar en mi Diario</button>
            </form>

            <!-- Zona de Copia de Seguridad -->
            <div class="backup-zone">
                <h3>💾 Copia de Seguridad</h3>
                <div class="backup-buttons">
                    <button id="btn-export" class="btn-backup-action">Exportar Datos</button>
                    <label for="btn-import" class="btn-backup-action label-import">Importar Datos</label>
                    <input type="file" id="btn-import" accept=".json" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <!-- Enlace al archivo de JavaScript -->
    <script src="script.js"></script>

</body>
</html>
